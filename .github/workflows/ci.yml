name: CI

on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run type check
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Run app integration test
        run: npm run test:integration

      - name: Run QQMusic integration test
        run: npm run test:integration:qqmusic
